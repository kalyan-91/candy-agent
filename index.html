<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Candy — Pavan's AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<canvas id="stars"></canvas>
<div class="grid-overlay"></div>

<!-- Ambient orbs -->
<div class="chat-ambient">
  <div class="ca-orb ca-orb--1"></div>
  <div class="ca-orb ca-orb--2"></div>
  <div class="ca-orb ca-orb--3"></div>
</div>

<div class="app" id="app">

  <!-- ════════ FULL-SCREEN CHAT ════════ -->
  <main class="chat">

    <!-- Header -->
    <header class="chat-header">

      <!-- Candy branding -->
      <div class="chat-header__brand">
        <div class="brand-orb">
          <svg class="brand-orb__ring" viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="36" fill="none" stroke="rgba(0,212,255,0.35)" stroke-width="1.5" stroke-dasharray="6 4"/>
            <circle cx="40" cy="40" r="28" fill="none" stroke="rgba(139,92,246,0.25)" stroke-width="1" stroke-dasharray="3 6"/>
          </svg>
          <div class="brand-orb__inner">C</div>
          <div class="brand-orb__pulse"></div>
        </div>
        <div class="brand-info">
          <div class="brand-name">Candy <span class="brand-version">v2</span></div>
          <div class="brand-sub"><span class="status-dot"></span>Pavan's AI assistant · always on</div>
        </div>
      </div>

      <!-- Actions -->
      <div class="chat-header__actions">
        <button class="hdr-btn" id="voiceToggle" title="Toggle voice" aria-label="Toggle voice">
          <i class="fas fa-volume-up"></i>
        </button>
        <button class="hdr-btn" id="clearBtn" title="New chat" aria-label="New chat">
          <i class="fas fa-pen-to-square"></i>
        </button>
        <a href="https://kalyanfinity-portfolio.netlify.app" target="_blank" rel="noopener noreferrer" class="hdr-btn" title="Visit Portfolio">
          <i class="fas fa-external-link-alt"></i>
        </a>
      </div>
    </header>

    <!-- Messages -->
    <div class="messages" id="messages" role="log" aria-live="polite"></div>

    <!-- Input -->
    <div class="input-wrap">
      <div class="suggestions-strip" id="suggestStrip"></div>

      <div class="input-box" id="inputBox">
        <button class="mic-btn" id="micBtn" title="Speak" aria-label="Voice input">
          <i class="fas fa-microphone"></i>
        </button>
        <textarea class="input-field" id="inputField"
          placeholder="Ask anything about Pavan…" rows="1" maxlength="500" aria-label="Message input"></textarea>
        <div class="input-right">
          <span class="char-count" id="charCount">500</span>
          <button class="send-btn" id="sendBtn" aria-label="Send message">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>
      <div class="input-footer">
        <span class="input-hint">↩ send · shift+↩ newline</span>
        <span id="voiceStatus" class="voice-status">🔊 Voice on</span>
      </div>
    </div>

  </main>
</div>

<div class="toast-wrap" id="toastWrap" aria-live="assertive"></div>
<script src="script.js"></script>
</body>
</html>
