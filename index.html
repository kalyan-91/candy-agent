<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Candy — Pavan's AI Assistant</title>
  <meta name="description" content="Chat with Candy, Pavan Kalyan's personal AI assistant."/>
  <meta property="og:title" content="Candy — Pavan's AI Assistant"/>
  <meta property="og:description" content="Ask Candy anything about Pavan Kalyan — Data Analyst, MCA Student."/>
  <meta property="og:url" content="https://candy-agent.netlify.app"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Ambient background -->
<div class="ambient">
  <div class="ambient__blob ambient__blob--1"></div>
  <div class="ambient__blob ambient__blob--2"></div>
  <div class="ambient__blob ambient__blob--3"></div>
</div>

<!-- Starfield canvas -->
<canvas id="stars"></canvas>

<!-- Grid overlay -->
<div class="grid-overlay"></div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<div class="app" id="app">

  <!-- ════════ CHAT ════════ -->
  <main class="chat">

    <!-- Header -->
    <header class="chat-header">
      <div class="chat-header__info">
        <div class="chat-header__avatar">
          <i class="fas fa-robot"></i>
          <span class="chat-header__ping"></span>
        </div>
        <div>
          <div class="chat-header__name">Candy <span class="chat-header__ai-tag">AI</span></div>
          <div class="chat-header__status"><span class="status-dot"></span>Pavan's assistant · always on</div>
        </div>
      </div>

      <div class="chat-header__actions">
        <button class="hdr-btn" id="voiceToggle" title="Toggle voice" aria-label="Toggle voice">
          <i class="fas fa-volume-up"></i>
        </button>
        <button class="hdr-btn" id="clearBtn" title="New chat" aria-label="New chat">
          <i class="fas fa-pen-to-square"></i>
        </button>
        <a href="https://kalyanfinity-portfolio.netlify.app" target="_blank" rel="noopener noreferrer" class="hdr-btn hdr-btn--link" title="Visit Portfolio" aria-label="Visit Portfolio">
          <i class="fas fa-external-link-alt"></i>
        </a>
      </div>
    </header>

    <!-- Messages -->
    <div class="messages" id="messages" role="log" aria-live="polite"></div>

    <!-- Input -->
    <div class="input-wrap">
      <div class="suggestions-strip" id="suggestStrip"></div>

      <div class="input-box" id="inputBox">
        <button class="mic-btn" id="micBtn" title="Speak" aria-label="Voice input">
          <i class="fas fa-microphone"></i>
        </button>
        <textarea class="input-field" id="inputField"
          placeholder="Ask anything about Pavan…" rows="1" maxlength="500" aria-label="Message input"></textarea>
        <div class="input-right">
          <span class="char-count" id="charCount">500</span>
          <button class="send-btn" id="sendBtn" aria-label="Send message">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>
      <div class="input-footer">
        <span class="input-hint">↩ send · shift+↩ newline</span>
        <span id="voiceStatus" class="voice-status">Voice on</span>
      </div>
    </div>

  </main>
</div>

<!-- Toast container -->
<div class="toast-wrap" id="toastWrap" aria-live="assertive"></div>

<!-- QRCode lib -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="script.js"></script>
</body>
</html>
