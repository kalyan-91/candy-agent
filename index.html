<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Candy — Pavan's AI Assistant</title>
  <meta name="description" content="Chat with Candy, Pavan Kalyan's personal AI assistant."/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ── Ambient background ── -->
<div class="ambient">
  <div class="ambient__blob ambient__blob--1"></div>
  <div class="ambient__blob ambient__blob--2"></div>
  <div class="ambient__blob ambient__blob--3"></div>
</div>

<!-- ── Starfield canvas ── -->
<canvas id="stars"></canvas>

<!-- ── Grid overlay ── -->
<div class="grid-overlay"></div>

<div class="app" id="app">

  <!-- ════════════════════ SIDEBAR ════════════════════ -->
  <aside class="sidebar" id="sidebar">
    <button class="sidebar-close" id="sidebarClose"><i class="fas fa-times"></i></button>

    <!-- Brand -->
    <div class="brand">
      <div class="brand-orb">
        <svg class="brand-orb__wave" viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="36" fill="none" stroke="rgba(0,212,255,0.3)" stroke-width="1" stroke-dasharray="6 4"/>
          <circle cx="40" cy="40" r="26" fill="none" stroke="rgba(0,212,255,0.15)" stroke-width="1"/>
        </svg>
        <div class="brand-orb__inner">C</div>
        <div class="brand-orb__pulse"></div>
      </div>
      <div class="brand-text">
        <div class="brand-name">Candy</div>
        <div class="brand-tag"><span class="status-dot"></span>Pavan's AI · Online</div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Profile card -->
    <div class="profile-card">
      <div class="profile-card__header">
        <div class="profile-card__img-wrap">
          <img src="https://kalyanfinity-portfolio.netlify.app/pavankalyan.jpg"
               alt="Pavan Kalyan"
               onerror="this.src='https://ui-avatars.com/api/?name=Pavan+Kalyan&size=80&background=050714&color=00d4ff&bold=true'">
          <div class="profile-card__img-ring"></div>
        </div>
        <div class="profile-card__meta">
          <div class="profile-card__name">D. Pavan Kalyan</div>
          <div class="profile-card__role">
            <span class="role-badge">Data Analytics</span>
            <span class="role-badge role-badge--dim">MCA '27</span>
          </div>
        </div>
      </div>
      <div class="profile-card__stats">
        <div class="stat-item">
          <div class="stat-item__val">6+</div>
          <div class="stat-item__lbl">Projects</div>
        </div>
        <div class="stat-item">
          <div class="stat-item__val">4mo</div>
          <div class="stat-item__lbl">Internship</div>
        </div>
        <div class="stat-item">
          <div class="stat-item__val">10+</div>
          <div class="stat-item__lbl">Skills</div>
        </div>
      </div>
      <div class="profile-card__links">
        <a href="https://github.com/kalyan-91" target="_blank" class="icon-link" title="GitHub"><i class="fab fa-github"></i></a>
        <a href="https://www.linkedin.com/in/daroor-pavan-kalyan-370277253/" target="_blank" class="icon-link" title="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
        <a href="mailto:daroorpavankalyan@gmail.com" class="icon-link" title="Email"><i class="fas fa-envelope"></i></a>
        <a href="https://wa.me/918919944203" target="_blank" class="icon-link" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
      </div>
    </div>

    <div class="divider"></div>

    <!-- QR section -->
    <div class="qr-section">
      <div class="section-label"><i class="fas fa-qrcode"></i> Portfolio</div>
      <div class="qr-card">
        <div class="qr-card__code" id="qrCode"></div>
        <p class="qr-card__hint">Scan to visit full portfolio</p>
        <div class="qr-card__actions">
          <a href="https://kalyanfinity-portfolio.netlify.app" target="_blank" class="pill-btn pill-btn--primary">
            <i class="fas fa-external-link-alt"></i> Portfolio
          </a>
          <a href="mailto:daroorpavankalyan@gmail.com" class="pill-btn pill-btn--ghost">
            <i class="fas fa-envelope"></i> Contact
          </a>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Quick asks -->
    <div class="quick-asks">
      <div class="section-label"><i class="fas fa-bolt"></i> Quick asks</div>
      <div class="quick-asks__list" id="quickAskList">
        <button class="quick-ask" data-q="What projects has Pavan built?"><span class="quick-ask__icon">🗂</span>Projects</button>
        <button class="quick-ask" data-q="What are Pavan's strongest skills?"><span class="quick-ask__icon">⚡</span>Skills</button>
        <button class="quick-ask" data-q="Tell me about Pavan's internship"><span class="quick-ask__icon">💼</span>Experience</button>
        <button class="quick-ask" data-q="Is Pavan available for hire?"><span class="quick-ask__icon">🎯</span>Hire</button>
        <button class="quick-ask" data-q="How do I contact Pavan?"><span class="quick-ask__icon">📬</span>Contact</button>
        <button class="quick-ask" data-q="What is Pavan studying?"><span class="quick-ask__icon">🎓</span>Education</button>
      </div>
    </div>

  </aside>

  <!-- ════════════════════ CHAT ════════════════════ -->
  <main class="chat">

    <!-- Header -->
    <header class="chat-header">
      <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>

      <div class="chat-header__info">
        <div class="chat-header__avatar">
          <span>C</span>
          <span class="chat-header__ping"></span>
        </div>
        <div>
          <div class="chat-header__name">Candy <span class="chat-header__ai-tag">AI</span></div>
          <div class="chat-header__status"><span class="status-dot"></span>Pavan's personal assistant · always on</div>
        </div>
      </div>

      <div class="chat-header__actions">
        <button class="hdr-btn" id="voiceToggle" title="Toggle voice">
          <i class="fas fa-volume-up"></i>
        </button>
        <button class="hdr-btn" id="clearBtn" title="New chat">
          <i class="fas fa-pen"></i>
        </button>
        <a href="https://kalyanfinity-portfolio.netlify.app" target="_blank" class="hdr-btn" title="Portfolio">
          <i class="fas fa-external-link-alt"></i>
        </a>
      </div>
    </header>

    <!-- Messages -->
    <div class="messages" id="messages"></div>

    <!-- Input -->
    <div class="input-wrap">

      <!-- Suggestions strip (shows above input, context-aware) -->
      <div class="suggestions-strip" id="suggestStrip"></div>

      <div class="input-box" id="inputBox">
        <button class="mic-btn" id="micBtn" title="Speak">
          <i class="fas fa-microphone"></i>
        </button>
        <textarea class="input-field" id="inputField"
          placeholder="Ask me anything about Pavan…" rows="1" maxlength="500"></textarea>
        <div class="input-right">
          <span class="char-count" id="charCount">500</span>
          <button class="send-btn" id="sendBtn" aria-label="Send">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>
      <div class="input-footer">
        <span>↩ send &nbsp;·&nbsp; shift+↩ newline</span>
        <span id="voiceStatus" class="voice-status">🔊 Voice on</span>
      </div>
    </div>

  </main>
</div>

<!-- Sidebar backdrop -->
<div class="backdrop" id="backdrop"></div>

<!-- Toast container -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- QRCode lib -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="script.js"></script>
</body>
</html>
